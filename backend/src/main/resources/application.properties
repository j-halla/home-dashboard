server.port=8080
spring.application.name=home-dashboard

dashboard.stationboard.station=${STATION_NAME:Zurich HB}
dashboard.stationboard.limit=6
dashboard.stationboard.api-url=https://transport.opendata.ch/v1/stationboard

dashboard.lights.user=${HUE_USER:}
dashboard.lights.bridge-address-fallback=${HUE_BRIDGE_ADDRESS:}
dashboard.lights.discovery-api-url=http://discovery.meethue.com/

dashboard.calendar.zip=${ZIP:8000}

dashboard.wifi.ssid=${WIFI_SSID:}
dashboard.wifi.password=${WIFI_PASSWORD:}

dashboard.weather.latitude=${WEATHER_LATITUDE:47.37}
dashboard.weather.longitude=${WEATHER_LONGITUDE:8.54}
dashboard.weather.api-url=https://api.open-meteo.com/v1/forecast
